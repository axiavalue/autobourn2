<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="#2A2A2A"/>
  <!-- Inner white ring -->
  <circle cx="40" cy="40" r="35" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Inner circle background -->
  <circle cx="40" cy="40" r="28" fill="#FFFFFF"/>
  <!-- Blue quadrants (top-right and bottom-left) -->
  <path d="M40 12 A28 28 0 0 1 68 40 L40 40 Z" fill="#0066B1"/>
  <path d="M40 68 A28 28 0 0 1 12 40 L40 40 Z" fill="#0066B1"/>
  <!-- White quadrants (top-left and bottom-right) are already white from the circle -->
  <!-- Inner circle border -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>
  <!-- BMW text -->
  <text x="24" y="10" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" letter-spacing="1">B</text>
  <text x="37.5" y="7" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" letter-spacing="1">M</text>
  <text x="52" y="10" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" letter-spacing="1">W</text>
</svg>
