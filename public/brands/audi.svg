<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <!-- Clip paths for interlocking effect -->
    <!-- For Ring 2: clip out the bottom intersection with Ring 1 -->
    <clipPath id="clip-r2-behind-r1">
      <rect x="0" y="0" width="80" height="40"/>
      <rect x="0" y="40" width="10" height="40"/>
      <rect x="22" y="40" width="58" height="40"/>
    </clipPath>
    <!-- For Ring 3: clip out the bottom intersection with Ring 2 -->
    <clipPath id="clip-r3-behind-r2">
      <rect x="0" y="0" width="80" height="40"/>
      <rect x="0" y="40" width="26" height="40"/>
      <rect x="38" y="40" width="42" height="40"/>
    </clipPath>
    <!-- For Ring 4: clip out the bottom intersection with Ring 3 -->
    <clipPath id="clip-r4-behind-r3">
      <rect x="0" y="0" width="80" height="40"/>
      <rect x="0" y="40" width="42" height="40"/>
      <rect x="54" y="40" width="26" height="40"/>
    </clipPath>
  </defs>
  
  <!-- Ring 1 (full, always in front at bottom) -->
  <circle cx="13" cy="40" r="12" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  
  <!-- Ring 2 - behind Ring 1 at bottom, in front of Ring 3 at bottom -->
  <!-- Bottom part hidden behind Ring 1 -->
  <circle cx="29" cy="40" r="12" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <!-- White mask over Ring 2 bottom-left (behind Ring 1) -->
  <path d="M17.5 41 A12 12 0 0 1 17.5 39" stroke="white" stroke-width="3" fill="none" opacity="0"/>
  
  <!-- Ring 3 -->
  <circle cx="45" cy="40" r="12" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  
  <!-- Ring 4 -->
  <circle cx="61" cy="40" r="12" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  
  <!-- Interlocking: white masks to hide "behind" segments, then redraw "front" segments -->
  
  <!-- === Ring 1 & Ring 2 interlocking === -->
  <!-- Hide Ring 2's top-left intersection (Ring 2 goes BEHIND Ring 1 on top) -->
  <path d="M19 29 A12 12 0 0 0 17 40" stroke="white" stroke-width="4" fill="none"/>
  <!-- Redraw Ring 1's top-right arc over Ring 2 -->
  <path d="M19 29 A12 12 0 0 1 23 33" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <path d="M23 33 A12 12 0 0 1 25 40" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <!-- Hide Ring 1's bottom intersection (Ring 1 goes BEHIND Ring 2 on bottom) -->
  <path d="M25 40 A12 12 0 0 1 19 51" stroke="white" stroke-width="4" fill="none"/>
  <!-- Redraw Ring 2's bottom-left arc over Ring 1 -->
  <path d="M25 40 A12 12 0 0 0 19 51" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  
  <!-- === Ring 2 & Ring 3 interlocking === -->
  <path d="M35 29 A12 12 0 0 0 33 40" stroke="white" stroke-width="4" fill="none"/>
  <path d="M35 29 A12 12 0 0 1 39 33" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <path d="M39 33 A12 12 0 0 1 41 40" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <path d="M41 40 A12 12 0 0 1 35 51" stroke="white" stroke-width="4" fill="none"/>
  <path d="M41 40 A12 12 0 0 0 35 51" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  
  <!-- === Ring 3 & Ring 4 interlocking === -->
  <path d="M51 29 A12 12 0 0 0 49 40" stroke="white" stroke-width="4" fill="none"/>
  <path d="M51 29 A12 12 0 0 1 55 33" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <path d="M55 33 A12 12 0 0 1 57 40" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
  <path d="M57 40 A12 12 0 0 1 51 51" stroke="white" stroke-width="4" fill="none"/>
  <path d="M57 40 A12 12 0 0 0 51 51" stroke="#2A2A2A" stroke-width="2.2" fill="none"/>
</svg>
